<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear Mya...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Loading quotes</p></div>
<div id="curtain"></div>
<div id="bg">
  <div class="bg-layer active"   id="bg-a"></div>
  <div class="bg-layer inactive" id="bg-b"></div>
</div>

<div id="logo">Dear Mya...</div>
<div id="datestamp"></div>
<div id="counter"></div>

<!-- <button id="refresh-btn" title="Reload from Google Sheet">
  <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.36-3.36L23 10M1 14l5.13 4.36A9 9 0 0020.49 15"/></svg>
  <span>Sync sheet</span>
</button> -->

<div id="stage">
  <div id="quote-block">
    <div id="quote-text"></div>
    <div id="attribution"><span id="attr-line"></span><span id="attr-name"></span></div>
  </div>
</div>

<div id="filmstrip-wrap"><div id="filmstrip"></div></div>

<div id="nav-next" title="Next quote">
  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  <span>Next</span>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
